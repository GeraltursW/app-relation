<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APP 页面图谱演示</title>
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="panel-head">
        <p class="eyebrow">Navigation</p>
        <h1>页面层级</h1>
      </div>
      <div class="search-box">
        <input id="searchInput" type="search" placeholder="搜索页面、入口、组件序号" />
      </div>
      <nav id="treeNav" class="tree-nav" aria-label="页面树"></nav>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">Application Map</p>
          <h2>三方应用 APP 页面跳转图谱</h2>
        </div>
        <div class="stats" id="statsBar"></div>
      </header>

      <section class="graph-scroll" id="graphScroll" aria-label="页面关系图">
        <div class="graph" id="graphRoot"></div>
      </section>
    </main>

    <aside class="inspector">
      <div class="panel-head">
        <p class="eyebrow">Inspector</p>
        <h2 id="detailTitle">节点详情</h2>
      </div>
      <div id="summaryPanel" class="summary"></div>
      <div id="imageStrip" class="image-strip"></div>
      <pre id="jsonPanel" class="json-panel">选择一个节点或跳转关系查看详情。</pre>
    </aside>
  </div>

  <div class="preview" id="preview" role="presentation">
    <div class="preview-title" id="previewTitle"></div>
    <div class="preview-imgs" id="previewImgs"></div>
  </div>

  <script src="./src/data.js"></script>
  <script src="./src/app.js"></script>
</body>
</html>
